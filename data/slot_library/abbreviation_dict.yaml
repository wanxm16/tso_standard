# 拼音缩写 → 中文全称字典
#
# 用途：I-02 字段特征提取中，对字段名做缩写展开
# 例：字段名 sfzh → 展开 [身份证号, 身份证号码]
#
# 来源：拍脑袋初始版（~90 个），从 `data/phrase_2/` 的典型字段名观察整理
# 维护：I-05 反馈回写会自动扩充；人工审核后合并进本字典
# 使用规则：优先整 token 精确匹配；切 token 后再按 token 展开

abbreviations:

