# 歧义说明（has_ambiguity=True 的键，字段特征提取时需要结合上下文消歧）
ambiguous_keys:
  - bm      # 编码 / 别名（根据是否有 "ch/绰号" 临近判定）
  - dw      # 点位 / 单位（根据同表字段判定）
  - jy      # 加油 / 就业（根据主题 L1 判定）
  - id_     # id 大多表示主键，不是"标识"概念
