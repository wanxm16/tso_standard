  - name: longitude
    cn_name: 经度
    logical_type: coordinate
    role: location
    description: WGS84/GCJ02 经度
    aliases: [经度, longitude, lng, lon, jd]
    sample_patterns:
      - name: longitude_decimal
        regex: '^-?(1[0-7]\d(\.\d+)?|180(\.0+)?|\d{1,2}(\.\d+)?)$'
    applicable_table_types: [事件]

  - name: latitude
    cn_name: 纬度
    logical_type: coordinate
    role: location
    description: WGS84/GCJ02 纬度
    aliases: [纬度, latitude, lat, wd]
    sample_patterns:
      - name: latitude_decimal
        regex: '^-?([0-8]\d(\.\d+)?|90(\.0+)?)$'
    applicable_table_types: [事件]

  # ========== 状态与类型类（§ 10.3 filter） ==========

