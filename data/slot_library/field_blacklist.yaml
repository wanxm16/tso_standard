# 字段黑名单 —— 这些字段不参与 VT 归一
#
# 消费路径：
#   src/pipeline/feature_builder.py → is_technical_noise()
#   打上 is_technical_noise=True 后，下游 slot_scorer.py 会直接跳过（见其 line 423）
#
# 三种粒度（任一命中即判为噪声）：
#   1) exact_names         精确 field_name（全表通配，大小写不敏感）
#   2) name_patterns       fnmatch 风格通配符（* 匹配任意字符）
#   3) table_field_pairs   精确 (table_en, field_name) 对，最细粒度
#
# 改完这份 yaml 后必须重跑：
#   python3 scripts/run_pipeline.py --from field_features
#
# UI 在 /normalization/review 和 VTEditor 的"剔除"按钮会自动追加到这里（写 exact_names 或 pairs）。
# 审计日志：data/feedback/field_blacklist_log.jsonl
#
# ============================================================

